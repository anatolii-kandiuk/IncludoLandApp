{% load static %}
<aside class="sidebar" aria-label="Навігація">
    <div class="sidebar__top">
        <div class="sidebar__brand">
            <div class="brand__mark" aria-hidden="true">
                <svg viewBox="0 0 48 48" role="img" focusable="false">
                    <path d="M8 12c8 0 12 4 16 8 4-4 8-8 16-8v24c-8 0-12 4-16 8-4-4-8-8-16-8V12z" fill="#ffffff" />
                    <path d="M8 12c8 0 12 4 16 8 4-4 8-8 16-8" fill="none" stroke="#0f7aa5" stroke-width="3"
                        stroke-linecap="round" />
                </svg>
            </div>
            <div class="brand__text"><span class="brand__name">IncludoLand</span></div>
        </div>
        <button class="sidebar__toggle" type="button" data-sidebar-toggle aria-expanded="false"
            aria-controls="sidebar-nav">
            ☰ Меню
        </button>
    </div>

    <nav class="nav" id="sidebar-nav">
        <div class="nav__section" aria-label="Головне">
            <a class="nav__item{% if active == 'profile' %} nav__item--active{% endif %}"
                href="{% url 'specialist_profile' %}">
                <span class="nav__icon" aria-hidden="true">🏠</span>
                <span class="nav__label">Мої Учні</span>
            </a>
            <a class="nav__item{% if active == 'all_activities' %} nav__item--active{% endif %}"
                href="{% url 'home' %}#games">
                <span class="nav__icon" aria-hidden="true">🎮</span>
                <span class="nav__label">Всі активності</span>
            </a>
            <a class="nav__item{% if active == 'print' %} nav__item--active{% endif %}"
                href="{% url 'specialist_print' %}">
                <span class="nav__icon" aria-hidden="true">🖨️</span>
                <span class="nav__label">Друк завдань</span>
            </a>
        </div>

        <div class="nav__section" aria-label="Бібліотека">
            <div class="nav__title">Бібліотека</div>
            <a class="nav__item{% if active == 'stories' %} nav__item--active{% endif %}"
                href="{% url 'specialist_stories' %}">
                <span class="nav__icon" aria-hidden="true">📖</span>
                <span class="nav__label">Казки</span>
            </a>
            <a class="nav__item{% if active == 'sounds' %} nav__item--active{% endif %}"
                href="{% url 'specialist_sounds' %}">
                <span class="nav__icon" aria-hidden="true">🔊</span>
                <span class="nav__label">Звуки</span>
            </a>
            <a class="nav__item{% if active == 'articulation' %} nav__item--active{% endif %}"
                href="{% url 'specialist_articulation' %}">
                <span class="nav__icon" aria-hidden="true">👄</span>
                <span class="nav__label">Артикуляція</span>
            </a>
            <a class="nav__item{% if active == 'words' %} nav__item--active{% endif %}"
                href="{% url 'specialist_words' %}">
                <span class="nav__icon" aria-hidden="true">🔤</span>
                <span class="nav__label">Слова</span>
            </a>
            <a class="nav__item{% if active == 'sentences' %} nav__item--active{% endif %}"
                href="{% url 'specialist_sentences' %}">
                <span class="nav__icon" aria-hidden="true">🧩</span>
                <span class="nav__label">Речення</span>
            </a>
            <a class="nav__item{% if active == 'my_story' %} nav__item--active{% endif %}"
                href="{% url 'specialist_my_story' %}">
                <span class="nav__icon" aria-hidden="true">📚</span>
                <span class="nav__label">Моя історія</span>
            </a>
            <!-- <a class="nav__item{% if active == 'activity_builder' %} nav__item--active{% endif %}"
                href="{% url 'specialist_activity_builder' %}">
                <span class="nav__icon" aria-hidden="true">🎬</span>
                <span class="nav__label">Активності</span>
            </a> -->
        </div>

        <div class="nav__spacer"></div>

        <a class="nav__item nav__item--logout" href="{% url 'logout' %}">
            <span class="nav__icon" aria-hidden="true">⎋</span>
            <span class="nav__label">Вихід</span>
        </a>
    </nav>

    {% if show_helper %}
    <section class="helper helper--sidebar" aria-label="Підказка">
        <div class="helper__owl" aria-hidden="true">
            <div class="owl">
                <div class="owl__face"></div>
                <div class="owl__eyes"><span></span><span></span></div>
                <div class="owl__beak"></div>
            </div>
        </div>
        <div class="helper__bubble">
            <div class="helper__title">Вітаю!</div>
            <div class="helper__text">Успішного дня!</div>
        </div>
    </section>
    {% endif %}
</aside>
